<div class="min-h-screen w-full flex items-center justify-center relative overflow-hidden">
  
  <div #loginCard class="w-full max-w-[420px] bg-white/5 backdrop-blur-2xl border border-white/10 rounded-[2.5rem] p-10 shadow-2xl z-10">
    <div class="text-center mb-10">
      <h1 class="text-4xl font-black text-white tracking-tighter italic">
        KINELA<span class="text-[#00ff88]">ID</span>
      </h1>
      <p class="text-gray-400 text-[10px] tracking-[0.3em] uppercase mt-2 font-medium">Security & Control</p>
    </div>

    @if (step === 'CREDENTIALS') {
      <div class="form-content space-y-6">
        <div class="space-y-2">
          <label class="text-[10px] uppercase tracking-widest text-[#00ff88] font-bold ml-2">Identidad</label>
          <input [(ngModel)]="credentials.username" type="text" placeholder="Usuario"
                 class="w-full bg-white/10 border border-white/10 rounded-2xl p-4 text-white focus:outline-none focus:border-[#00ff88] transition-all">
        </div>
        <div class="space-y-2">
          <label class="text-[10px] uppercase tracking-widest text-[#00ff88] font-bold ml-2">Llave</label>
          <input [(ngModel)]="credentials.password" type="password" placeholder="••••••••"
                 class="w-full bg-white/10 border border-white/10 rounded-2xl p-4 text-white focus:outline-none focus:border-[#00ff88] transition-all">
        </div>
        @if (errorMessage) {
          <p class="text-red-400 text-xs text-center">{{ errorMessage }}</p>
        }
        <button (click)="onSubmit()" [disabled]="isLoading"
                class="w-full bg-[#00ff88] text-[#070b14] font-black tracking-widest py-4 rounded-2xl active:scale-95 disabled:opacity-50 transition-all">
          {{ isLoading ? 'PROCESANDO...' : 'ENTRAR' }}
        </button>
      </div>
    } @else {
      <div class="biometric-content text-center space-y-6">
        <div class="relative w-56 h-56 mx-auto">
          <div class="pulse-ring absolute inset-0 border-2 border-[#00ff88] rounded-full"></div>
          <div class="w-full h-full rounded-full bg-black overflow-hidden border-4 border-white/10 relative">
             <video #videoFeed autoplay playsinline class="w-full h-full object-cover"></video>
             <div class="scan-line-video"></div>
          </div>
        </div>
        <p class="text-white text-sm font-medium tracking-wide">Escaneando rostro...</p>
        <button (click)="captureAndVerify()" [disabled]="isLoading"
                class="w-full bg-[#00ff88] text-[#070b14] font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all">
          {{ isLoading ? 'VERIFICANDO...' : 'CONFIRMAR' }}
        </button>
      </div>
    }
  </div>
</div>
